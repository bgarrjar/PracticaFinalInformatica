<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuentra tu Cargador</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-left">
            <h1>Encuentra tu Cargador</h1>
            <span class="user-name" id="userName"></span>
        </div>

        <div class="header-right">
            <button onclick="window.location.href='reservas.html'">Mis reservas</button>
        </div>
    </header>

    <div id="map"></div>

    <div class="modal" id="chargerModal">
        <div class="modal-content">
            <h2 id="chargerName"></h2>
    
            <p><strong>Tipo:</strong> <span id="chargerType"></span></p>
            <p><strong>Estado:</strong> <span id="chargerStatus"></span></p>
            <p><strong>Nivel de batería:</strong> <span id="chargerBattery"></span></p>
            <p><strong>Tiempo estimado de carga:</strong> <span id="chargerTime"></span></p>
            <p><strong>Coste:</strong> <span id="chargerCost"></span></p>
    
            <div class="modal-buttons">
                <button class="reserve-btn" onclick="mostrarFormularioReserva()">Reservar</button>
                <button class="incident-btn" onclick="irAIncidencia()">Notificar incidencia</button>
                <button class="close-btn" onclick="cerrarModal()">Cerrar</button>
            </div>
    
            <div class="reserve-form" id="reserveForm">
                <h3>Selecciona fecha y hora</h3>
    
                <label for="reserveDate">Día:</label>
                <input type="date" id="reserveDate">
    
                <label for="reserveTime">Hora:</label>
                <input type="time" id="reserveTime">
    
                <div class="reserve-form-buttons">
                    <button class="confirm-btn" onclick="confirmarReserva()">Confirmar reserva</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        // Mostrar nombre del usuario que inició sesión
        const nombre = localStorage.getItem("nombre");
        const apellido = localStorage.getItem("apellido");

        if (nombre && apellido) {
            document.getElementById("userName").innerText = nombre + " " + apellido;
        }

        // Crear mapa
        const map = L.map("map").setView([40.4168, -3.7038], 13);

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            attribution: "© OpenStreetMap"
        }).addTo(map);

        // Variable para guardar el cargador seleccionado
        let cargadorSeleccionado = null;

        // Cargar cargadores desde backend
        async function cargarCargadores() {
            try {
                const response = await fetch("/api/cargadores");
                const cargadores = await response.json();

                cargadores.forEach(c => {
                    const marker = L.marker([c.lat, c.lng]).addTo(map);

                    marker.on("click", function () {
                        cargadorSeleccionado = c;

                        document.getElementById("chargerName").innerText = c.name;
                        document.getElementById("chargerType").innerText = c.type;
                        document.getElementById("chargerStatus").innerText = c.status;
                        document.getElementById("chargerBattery").innerText = c.battery + "%";
                        document.getElementById("chargerTime").innerText = c.time + " min";
                        document.getElementById("chargerCost").innerText = c.cost + " €";

                        document.getElementById("chargerModal").style.display = "block";
                    });
                });

            } catch (error) {
                console.error("Error cargando cargadores:", error);
            }
        }

        cargarCargadores();

        function cerrarModal() {
            document.getElementById("chargerModal").style.display = "none";
        }

        function reservar() {
            if (!cargadorSeleccionado) {
                alert("No hay ningún cargador seleccionado");
                return;
            }

            alert("Has reservado el cargador: " + cargadorSeleccionado.name);
        }

        window.onclick = function (event) {
            const modal = document.getElementById("chargerModal");
            if (event.target === modal) {
                cerrarModal();
            }
        };
    </script>


<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="map.js"></script>

</body>

</html>
