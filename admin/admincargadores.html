<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gestión de Cargadores</title>
<link rel="stylesheet" href="../css/styles.css">
</head>

<body>

<h1>Gestión de Cargadores</h1>

<h2>Añadir Cargador</h2>

<form>

<label>Nombre:</label> <input type="text" id="nombre" required>

<br><br>

<label>Tipo:</label> <select id="tipo">

<option value="Rápido">Rápido</option>
<option value="Estándar">Estándar</option>
<option value="Compatible">Compatible</option>
</select>

<br><br>

<label>Estado:</label> <select id="estado">

<option value="Libre">Libre</option>
<option value="Ocupado">Ocupado</option>
<option value="En reparación">En reparación</option>
</select>

<br><br>

<label>Ubicación:</label> <input type="text" id="ubicacion" required>

<br><br>

<button type="submit">Añadir cargador</button>

</form>

<hr>

<h2>Lista de cargadores</h2>

<table border="1">

<thead>
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Tipo</th>
<th>Estado</th>
<th>Ubicación</th>
<th>Acciones</th>
</tr>
</thead>

<tbody>

<tr>
<td>1</td>
<td>Cargador A</td>
<td>Rápido</td>
<td>Libre</td>
<td>Madrid Centro</td>
<td>
<button>Ver</button>
<button>Editar</button>
<button class="eliminar">Eliminar</button>
</td>
</tr>

<tr>
<td>2</td>
<td>Cargador B</td>
<td>Estándar</td>
<td>Ocupado</td>
<td>Madrid Norte</td>
<td>
<button>Ver</button>
<button>Editar</button>
<button class="eliminar">Eliminar</button>
</td>
</tr>

</tbody>

</table>

<script src="admincargadores.js"></script>

</body>
</html>
